<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monkeé – TikTok Login</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #000;
      color: #fff;
    }
    .box {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #fe2c55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #aaa; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>Verbinde mit Monkeé…</h2>
    <p>Du wirst automatisch weitergeleitet.</p>
  </div>
  <script>
    // Capture all URL params from TikTok and forward to local Monkeé app
    const params = window.location.search;
    window.location.href = "http://localhost:8000/api/tiktok/callback" + params;
  </script>
</body>
</html>
